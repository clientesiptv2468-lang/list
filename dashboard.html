<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Orçamentos</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .senha-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
        }

        .senha-modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .senha-modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
        }

        .senha-modal h2 {
            color: #667eea;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .senha-modal .form-group {
            margin-bottom: 15px;
        }

        .senha-modal input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .senha-modal button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
        }

        .senha-modal button:hover {
            background: #764ba2;
        }

        .header-right {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .btn-admin {
            padding: 8px 16px;
            background-color: #ff9800;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
        }

        .btn-admin:hover {
            background-color: #f57c00;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <h1 class="logo">📋 App de Orçamentos</h1>
        </div>
        <div class="header-right">
            <span id="usuarioNome" class="usuario-info"></span>
            <button id="btnAdmin" class="btn-admin" style="display: none;">⚙️ Admin</button>
            <button id="btnSair" class="btn-sair">Sair</button>
        </div>
    </header>

    <!-- Modal de Alteração de Senha -->
    <div id="senhaModal" class="senha-modal">
        <div class="senha-modal-content">
            <h2>⚠️ Alterar Senha</h2>
            <p>É obrigatório alterar sua senha na primeira vez!</p>
            <form id="formAlterarSenha">
                <div class="form-group">
                    <label for="senhaAtual">Senha Atual</label>
                    <input type="password" id="senhaAtual" required placeholder="Sua senha atual">
                </div>
                <div class="form-group">
                    <label for="novaSenha">Nova Senha</label>
                    <input type="password" id="novaSenha" required placeholder="Nova senha">
                </div>
                <div class="form-group">
                    <label for="confirmarSenha">Confirmar Nova Senha</label>
                    <input type="password" id="confirmarSenha" required placeholder="Confirme a nova senha">
                </div>
                <button type="submit">Atualizar Senha</button>
            </form>
        </div>
    </div>

    <!-- Main Container -->
    <main class="main-container">
        <!-- Seção de Novo Orçamento -->
        <section class="nova-orcamento-section">
            <h2>Novo Orçamento</h2>
            
            <!-- Dados do Cliente -->
            <div class="cliente-section">
                <h3>Dados do Cliente</h3>
                <form id="formCliente" class="form-cliente">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="clienteNome">Nome do Cliente</label>
                            <input type="text" id="clienteNome" required placeholder="Nome completo">
                        </div>
                        <div class="form-group">
                            <label for="clienteEmail">Email</label>
                            <input type="email" id="clienteEmail" required placeholder="email@exemplo.com">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="clienteTelefone">Telefone</label>
                            <input type="tel" id="clienteTelefone" required placeholder="(11) 9999-9999">
                        </div>
                        <div class="form-group">
                            <label for="clienteEndereco">Endereço</label>
                            <input type="text" id="clienteEndereco" required placeholder="Rua, número, bairro">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="clienteCidade">Cidade</label>
                            <input type="text" id="clienteCidade" required placeholder="Cidade">
                        </div>
                        <div class="form-group">
                            <label for="dataOrcamento">Data do Orçamento</label>
                            <input type="date" id="dataOrcamento" required>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Upload de Mídia -->
            <div class="midia-section">
                <h3>Anexar Fotos e Vídeos</h3>
                <div class="upload-area" id="uploadArea">
                    <input type="file" id="fileInput" multiple accept="image/*,video/*" style="display:none">
                    <p>Clique para adicionar fotos ou vídeos</p>
                </div>
                <div id="midiaLista" class="midia-lista"></div>
            </div>

            <!-- Itens do Orçamento -->
            <div class="itens-section">
                <h3>Itens do Orçamento</h3>
                
                <div class="form-item" id="formNovoItem">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="itemQuantidade">Quantidade</label>
                            <input type="number" id="itemQuantidade" min="1" value="1" placeholder="1">
                        </div>
                        <div class="form-group">
                            <label for="itemDescricao">Descrição</label>
                            <input type="text" id="itemDescricao" placeholder="Descrição do serviço/produto">
                        </div>
                        <div class="form-group">
                            <label for="itemValor">Valor Unitário (R$)</label>
                            <input type="number" id="itemValor" min="0" step="0.01" placeholder="0.00">
                        </div>
                        <button type="button" id="btnAdicionarItem" class="btn-adicionar">Adicionar Item</button>
                    </div>
                </div>

                <!-- Tabela de Itens -->
                <div class="tabela-container">
                    <table id="tabelaItens" class="tabela-itens">
                        <thead>
                            <tr>
                                <th>Quantidade</th>
                                <th>Descrição</th>
                                <th>Valor Unitário</th>
                                <th>Subtotal</th>
                                <th>Ação</th>
                            </tr>
                        </thead>
                        <tbody id="corpoTabela">
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Total do Orçamento -->
            <div class="total-section">
                <div class="total-box">
                    <label>Valor Total do Orçamento:</label>
                    <div class="total-valor">R$ <span id="valorTotal">0.00</span></div>
                </div>
            </div>

            <!-- Botões de Ação -->
            <div class="botoes-acao">
                <button id="btnLimpar" class="btn-secundario">Limpar Tudo</button>
                <button id="btnSalvar" class="btn-primario" onclick="salvarOrcamento()">Salvar Orçamento</button>
                <button id="btnPDF" class="btn-primario">Gerar PDF</button>
            </div>
        </section>

        <!-- Seção de Orçamentos Salvos -->
        <section class="orcamentos-salvos-section">
            <h2>Meus Orçamentos</h2>
            <div id="listaOrcamentos" class="lista-orcamentos"></div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="js/auth-secure.js"></script>
    <script src="js/orcamento-isolado.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Verificar primeira vez que loga
        window.addEventListener('load', function() {
            const primeiroLogin = sessionStorage.getItem('primeiroLogin');
            if (primeiroLogin === 'true') {
                document.getElementById('senhaModal').classList.add('show');
            }

            // Mostrar botão admin se for admin (para futuro)
            const usuario = obterUsuarioAutenticado();
            if (usuario && usuario.papel === 'admin') {
                document.getElementById('btnAdmin').style.display = 'block';
                document.getElementById('btnAdmin').onclick = () => window.location.href = 'admin.html';
            }

            // Inicializar orçamentos
            inicializarOrcamentos();
        });

        // Evento de alteração de senha
        if (document.getElementById('formAlterarSenha')) {
            document.getElementById('formAlterarSenha').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const senhaAtual = document.getElementById('senhaAtual').value;
                const novaSenha = document.getElementById('novaSenha').value;
                const confirmarSenha = document.getElementById('confirmarSenha').value;
                
                if (novaSenha !== confirmarSenha) {
                    alert('As senhas não conferem!');
                    return;
                }

                if (novaSenha.length < 6) {
                    alert('A nova senha deve ter no mínimo 6 caracteres!');
                    return;
                }

                const resultado = alterarSenhaUsuario(senhaAtual, novaSenha);
                
                if (resultado.sucesso) {
                    alert(resultado.mensagem);
                    sessionStorage.removeItem('primeiroLogin');
                    document.getElementById('senhaModal').classList.remove('show');
                    this.reset();
                } else {
                    alert('Erro: ' + resultado.erro);
                }
            });
        }
    </script>
</body>
</html>
